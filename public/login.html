<!doctype html>
<html lang="ko" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 — shadcn/ui</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
          },
        },
      };
    </script>
    <style>
      /* ── CSS Variables (Light) ── */
      :root {
        --background: 0 0% 100%;
        --foreground: 240 10% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 240 10% 3.9%;
        --primary: 240 5.9% 10%;
        --primary-foreground: 0 0% 98%;
        --secondary: 240 4.8% 95.9%;
        --secondary-foreground: 240 5.9% 10%;
        --muted: 240 4.8% 95.9%;
        --muted-foreground: 240 3.8% 46.1%;
        --accent: 240 4.8% 95.9%;
        --accent-foreground: 240 5.9% 10%;
        --border: 240 5.9% 90%;
        --input: 240 5.9% 90%;
        --ring: 240 5.9% 10%;
        --radius: 0.625rem;
      }

      /* ── CSS Variables (Dark) ── */
      .dark {
        --background: 240 10% 3.9%;
        --foreground: 0 0% 98%;
        --card: 240 10% 3.9%;
        --card-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --primary-foreground: 240 5.9% 10%;
        --secondary: 240 3.7% 15.9%;
        --secondary-foreground: 0 0% 98%;
        --muted: 240 3.7% 15.9%;
        --muted-foreground: 240 5% 64.9%;
        --accent: 240 3.7% 15.9%;
        --accent-foreground: 0 0% 98%;
        --border: 240 3.7% 15.9%;
        --input: 240 3.7% 15.9%;
        --ring: 240 4.9% 83.9%;
      }

      * {
        box-sizing: border-box;
        border-color: hsl(var(--border));
      }

      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Card ── */
      .card {
        background-color: hsl(var(--card));
        color: hsl(var(--card-foreground));
        border: 1px solid hsl(var(--border));
        border-radius: var(--radius);
        box-shadow:
          0 1px 3px 0 rgb(0 0 0 / 0.1),
          0 1px 2px -1px rgb(0 0 0 / 0.1);
        overflow: hidden;
      }

      /* ── Input ── */
      .input {
        display: flex;
        height: 2.25rem;
        width: 100%;
        border-radius: calc(var(--radius) - 2px);
        border: 1px solid hsl(var(--input));
        background-color: transparent;
        padding: 0.25rem 0.75rem;
        font-size: 0.875rem;
        color: hsl(var(--foreground));
        outline: none;
        transition: box-shadow 0.15s;
      }
      .input::placeholder {
        color: hsl(var(--muted-foreground));
      }
      .input:focus {
        box-shadow: 0 0 0 3px hsl(var(--ring) / 0.2);
        border-color: hsl(var(--ring));
      }

      /* ── Button ── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        white-space: nowrap;
        border-radius: calc(var(--radius) - 2px);
        font-size: 0.875rem;
        font-weight: 500;
        height: 2.25rem;
        padding: 0 1rem;
        cursor: pointer;
        transition:
          background-color 0.15s,
          opacity 0.15s;
        border: 1px solid transparent;
        width: 100%;
        text-decoration: none;
      }
      .btn-primary {
        background-color: hsl(var(--primary));
        color: hsl(var(--primary-foreground));
      }
      .btn-primary:hover {
        background-color: hsl(var(--primary) / 0.9);
      }
      .btn-outline {
        background-color: transparent;
        border-color: hsl(var(--border));
        color: hsl(var(--foreground));
      }
      .btn-outline:hover {
        background-color: hsl(var(--accent));
        color: hsl(var(--accent-foreground));
      }
      .btn-icon {
        width: auto;
        flex: 1;
      }
      .btn-icon svg {
        width: 1rem;
        height: 1rem;
      }

      /* ── Label ── */
      .label {
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1;
        color: hsl(var(--foreground));
      }

      /* ── Separator ── */
      .separator {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: hsl(var(--muted-foreground));
        font-size: 0.75rem;
      }
      .separator::before,
      .separator::after {
        content: "";
        flex: 1;
        height: 1px;
        background-color: hsl(var(--border));
      }

      /* ── Theme Toggle ── */
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 50%;
        border: 1px solid hsl(var(--border));
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        transition: background-color 0.15s;
        z-index: 50;
      }
      .theme-toggle:hover {
        background-color: hsl(var(--accent));
      }

      /* ── Side Image (gradient fallback) ── */
      .side-image {
        background: linear-gradient(
          135deg,
          hsl(240 5.9% 10%) 0%,
          hsl(240 3.7% 25%) 50%,
          hsl(240 5.9% 10%) 100%
        );
        position: relative;
        overflow: hidden;
      }
      .dark .side-image {
        background: linear-gradient(
          135deg,
          hsl(240 3.7% 8%) 0%,
          hsl(240 3.7% 18%) 50%,
          hsl(240 3.7% 8%) 100%
        );
      }
      .side-image-pattern {
        position: absolute;
        inset: 0;
        opacity: 0.08;
        background-image: radial-gradient(
            circle at 25% 25%,
            white 1px,
            transparent 1px
          ),
          radial-gradient(circle at 75% 75%, white 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .side-image-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        height: 100%;
        padding: 2.5rem;
        color: white;
      }
      .side-image-logo {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin-bottom: auto;
        padding-top: 2.5rem;
      }
      .side-image-quote {
        font-size: 1rem;
        line-height: 1.6;
        opacity: 0.85;
        margin-bottom: 0.5rem;
      }
      .side-image-author {
        font-size: 0.875rem;
        opacity: 0.6;
      }

      /* ── Muted text ── */
      .text-muted {
        color: hsl(var(--muted-foreground));
      }

      /* ── Link ── */
      a.link {
        color: hsl(var(--foreground));
        text-decoration: none;
        text-underline-offset: 4px;
      }
      a.link:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <!-- 다크모드 토글 -->
    <button class="theme-toggle" id="themeToggle" title="테마 전환">
      <span id="themeIcon">🌙</span>
    </button>

    <!-- 페이지 래퍼 -->
    <div
      class="flex min-h-screen flex-col items-center justify-center p-6 md:p-10"
      style="background-color: hsl(var(--muted))"
    >
      <div class="w-full max-w-sm md:max-w-4xl">
        <!-- 카드 -->
        <div class="card">
          <div class="grid md:grid-cols-2">
            <!-- 좌측: 폼 -->
            <div class="p-6 md:p-8">
              <div class="flex flex-col gap-6">
                <!-- 헤더 -->
                <div class="flex flex-col items-center gap-1 text-center">
                  <h1 class="text-2xl font-bold tracking-tight">
                    다시 오셨군요 👋
                  </h1>
                  <p class="text-sm text-muted">
                    Acme Inc 계정으로 로그인하세요
                  </p>
                </div>

                <!-- 폼 필드 -->
                <div class="flex flex-col gap-4">
                  <!-- 이메일 -->
                  <div class="flex flex-col gap-1.5">
                    <label class="label" for="email">이메일</label>
                    <input
                      id="email"
                      class="input"
                      type="email"
                      placeholder="name@example.com"
                      autocomplete="email"
                    />
                  </div>

                  <!-- 비밀번호 -->
                  <div class="flex flex-col gap-1.5">
                    <div
                      class="flex items-center justify-between"
                      style="height: 1rem"
                    >
                      <label class="label" for="password">비밀번호</label>
                      <a
                        href="#"
                        class="link"
                        style="font-size: 0.75rem; color: hsl(var(--muted-foreground))"
                        >비밀번호 찾기</a
                      >
                    </div>
                    <input
                      id="password"
                      class="input"
                      type="password"
                      placeholder="••••••••"
                      autocomplete="current-password"
                    />
                  </div>

                  <!-- 로그인 버튼 -->
                  <button class="btn btn-primary" type="button">
                    로그인
                  </button>

                  <!-- 구분선 -->
                  <div class="separator">소셜 계정으로 계속하기</div>

                  <!-- 소셜 버튼 -->
                  <div class="grid grid-cols-3 gap-3">
                    <!-- Apple -->
                    <button
                      class="btn btn-outline btn-icon"
                      type="button"
                      title="Apple로 로그인"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                      >
                        <path
                          d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701"
                        />
                      </svg>
                      <span class="sr-only">Apple</span>
                    </button>

                    <!-- Google -->
                    <button
                      class="btn btn-outline btn-icon"
                      type="button"
                      title="Google로 로그인"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                      >
                        <path
                          d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"
                        />
                      </svg>
                      <span class="sr-only">Google</span>
                    </button>

                    <!-- Meta -->
                    <button
                      class="btn btn-outline btn-icon"
                      type="button"
                      title="Meta로 로그인"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                      >
                        <path
                          d="M6.915 4.03c-1.968 0-3.683 1.28-4.871 3.113C.704 9.208 0 11.883 0 14.449c0 .706.07 1.369.21 1.973a6.624 6.624 0 0 0 .265.86 5.297 5.297 0 0 0 .371.761c.696 1.159 1.818 1.927 3.593 1.927 1.497 0 2.633-.671 3.965-2.444.76-1.012 1.144-1.626 2.663-4.32l.756-1.339.186-.325c.061.1.121.196.183.3l2.152 3.595c.724 1.21 1.665 2.556 2.47 3.314 1.046.987 1.992 1.22 3.06 1.22 1.075 0 1.876-.355 2.455-.843a3.743 3.743 0 0 0 .81-.973c.542-.939.861-2.127.861-3.745 0-2.72-.681-5.357-2.084-7.45-1.282-1.912-2.957-2.93-4.716-2.93-1.047 0-2.088.467-3.053 1.308-.652.57-1.257 1.29-1.82 2.05-.69-.875-1.335-1.547-1.958-2.056-1.182-.966-2.315-1.303-3.454-1.303zm10.16 2.053c1.147 0 2.188.758 2.992 1.999 1.132 1.748 1.647 4.195 1.647 6.4 0 1.548-.368 2.9-1.839 2.9-.58 0-1.027-.23-1.664-1.004-.496-.601-1.343-1.878-2.832-4.358l-.617-1.028a44.908 44.908 0 0 0-1.255-1.98c.07-.109.141-.224.211-.327 1.12-1.667 2.118-2.602 3.358-2.602zm-10.201.553c1.265 0 2.058.791 2.675 1.446.307.327.737.871 1.234 1.579l-1.02 1.566c-.757 1.163-1.882 3.017-2.837 4.338-1.191 1.649-1.81 1.817-2.486 1.817-.524 0-1.038-.237-1.383-.794-.263-.426-.464-1.13-.464-2.046 0-2.221.63-4.535 1.66-6.088.454-.687.964-1.226 1.533-1.533a2.264 2.264 0 0 1 1.088-.285z"
                        />
                      </svg>
                      <span class="sr-only">Meta</span>
                    </button>
                  </div>

                  <!-- 회원가입 안내 -->
                  <p class="text-center text-sm text-muted">
                    계정이 없으신가요?
                    <a
                      href="#"
                      class="link"
                      style="color: hsl(var(--foreground)); font-weight: 500"
                      >회원가입</a
                    >
                  </p>
                </div>
              </div>
            </div>

            <!-- 우측: 이미지/그라디언트 패널 (md 이상에서만 표시) -->
            <div class="side-image hidden md:block">
              <div class="side-image-pattern"></div>
              <div class="side-image-content">
                <div class="side-image-logo">⚡ Acme Inc</div>
                <blockquote>
                  <p class="side-image-quote">
                    "이 플랫폼 덕분에 우리 팀의 생산성이 두 배로 늘었습니다.
                    강력한 기능과 직관적인 인터페이스가 정말 인상적입니다."
                  </p>
                  <footer class="side-image-author">
                    — 김민준, CTO @ StartupXYZ
                  </footer>
                </blockquote>
              </div>
            </div>
          </div>
        </div>

        <!-- 하단 약관 안내 -->
        <p
          class="mt-4 text-center text-xs"
          style="color: hsl(var(--muted-foreground))"
        >
          계속하면
          <a href="#" class="link" style="color: hsl(var(--muted-foreground))"
            >서비스 이용약관</a
          >
          및
          <a href="#" class="link" style="color: hsl(var(--muted-foreground))"
            >개인정보처리방침</a
          >에 동의하는 것으로 간주됩니다.
        </p>
      </div>
    </div>

    <script>
      // 다크모드 토글
      const html = document.documentElement;
      const icon = document.getElementById("themeIcon");

      // 시스템 테마 감지
      const prefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)"
      ).matches;
      if (prefersDark) {
        html.classList.replace("light", "dark");
        icon.textContent = "☀️";
      }

      document.getElementById("themeToggle").addEventListener("click", () => {
        const isDark = html.classList.contains("dark");
        html.classList.toggle("dark", !isDark);
        html.classList.toggle("light", isDark);
        icon.textContent = isDark ? "🌙" : "☀️";
      });
    </script>
  </body>
</html>
